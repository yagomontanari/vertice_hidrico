version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: vertice-web-mvp
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

